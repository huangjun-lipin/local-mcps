<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能翻译助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }
    .header {
      background: linear-gradient(135deg, #1a73e8, #4285f4);
      color: #fff;
      padding: 14px 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 12px;
      opacity: 0.85;
    }
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .section:last-child { border-bottom: none; }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #333;
    }
    select, input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }
    select:focus, input:focus {
      border-color: #1a73e8;
      background: #fff;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .row label { margin-bottom: 0; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      display: inline-block;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::after {
      content: '';
      position: absolute;
      top: 2px; left: 2px;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #1a73e8;
    }
    .toggle input:checked + .slider::after {
      transform: translateX(18px);
    }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #1a73e8;
      color: #fff;
    }
    .btn-primary:hover { background: #1557b0; }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover { background: #e0e0e0; }
    .status {
      font-size: 11px;
      color: #0a8043;
      margin-top: 6px;
      display: none;
    }
    .status.show { display: block; }
    .shortcuts {
      font-size: 12px;
      color: #666;
      line-height: 1.8;
    }
    .shortcuts kbd {
      display: inline-block;
      padding: 1px 6px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-family: monospace;
      font-size: 11px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌐 智能翻译助手</h1>
    <p>选中文字 · 自动翻译</p>
  </div>

  <div class="section">
    <div class="section-title">翻译设置</div>
    <label for="targetLang">目标语言</label>
    <select id="targetLang">
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁體中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
      <option value="es">Español</option>
      <option value="pt">Português</option>
      <option value="ru">Русский</option>
      <option value="ar">العربية</option>
      <option value="hi">हिन्दी</option>
      <option value="th">ไทย</option>
      <option value="vi">Tiếng Việt</option>
      <option value="id">Bahasa Indonesia</option>
      <option value="it">Italiano</option>
      <option value="nl">Nederlands</option>
      <option value="pl">Polski</option>
      <option value="tr">Türkçe</option>
      <option value="uk">Українська</option>
    </select>
  </div>

  <div class="section">
    <div class="section-title">字幕翻译</div>
    <div class="row">
      <label for="subtitleToggle">自动翻译字幕（Alt+S 开关）</label>
      <label class="toggle">
        <input type="checkbox" id="subtitleToggle" />
        <span class="slider"></span>
      </label>
    </div>
    <p style="font-size:11px;color:#888;margin-top:4px;">
      启用后，视频字幕将自动翻译并显示覆盖层
    </p>
  </div>

  <div class="section" id="apiConfigSection" style="display:none;">
    <div class="section-title">API 配置</div>
    <label for="apiUrl">API 地址</label>
    <input type="text" id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions" />
    <label for="apiKey" style="margin-top:8px;">API Key</label>
    <input type="password" id="apiKey" placeholder="sk-..." />
    <label for="model" style="margin-top:8px;">模型</label>
    <input type="text" id="model" placeholder="gpt-4o-mini" />
    <div class="btn-row">
      <button class="btn btn-primary" id="saveApiBtn">保存</button>
      <button class="btn btn-secondary" id="hideApiBtn">取消</button>
    </div>
    <div class="status" id="saveStatus">✅ 已保存</div>
  </div>

  <div class="section">
    <div class="btn-row">
      <button class="btn btn-secondary" id="showApiBtn">⚙️ API 设置</button>
      <button class="btn btn-primary" id="saveLangBtn">💾 保存语言</button>
    </div>
    <div class="status" id="langStatus">✅ 已保存</div>
  </div>

  <div class="section">
    <div class="section-title">快捷键</div>
    <div class="shortcuts">
      <kbd>Alt</kbd> + <kbd>T</kbd> 翻译选中文字<br />
      <kbd>Alt</kbd> + <kbd>S</kbd> 开关字幕翻译覆盖层<br />
      <kbd>Esc</kbd> 关闭翻译弹窗
    </div>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
